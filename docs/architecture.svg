<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Flashcard Generator system architecture</title>
  <desc id="desc">React uploads a document to Spring Boot. Spring creates a Redis job, parses the document asynchronously, calls Gemini, persists the deck in Firestore, and exposes status and result APIs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081126"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#93c5fd"/></marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#86efac"/></marker>
    <marker id="purpleArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#c084fc"/></marker>
    <style>
      text{font-family:Inter,Segoe UI,Arial,sans-serif}
      .zone-title{font-size:18px;font-weight:700}
      .node-title{font-size:15px;font-weight:700}
      .node-copy{font-size:12px}
      .edge-label{font-size:11px;fill:#cbd5e1}
      .edge{fill:none;stroke-width:2}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="48" text-anchor="middle" fill="#e2e8f0" font-size="28" font-weight="750">AI Flashcard Generator - System Architecture</text>

  <g filter="url(#shadow)">
    <rect x="40" y="90" width="300" height="690" rx="22" fill="#172554" stroke="#3b82f6"/>
    <rect x="390" y="90" width="760" height="690" rx="22" fill="#052e16" stroke="#22c55e"/>
    <rect x="1200" y="90" width="350" height="690" rx="22" fill="#3b0764" stroke="#a855f7"/>
  </g>
  <text class="zone-title" x="65" y="125" fill="#dbeafe">Frontend</text>
  <text class="zone-title" x="415" y="125" fill="#dcfce7">Spring Boot Backend</text>
  <text class="zone-title" x="1225" y="125" fill="#f3e8ff">External Services</text>

  <g>
    <rect x="80" y="165" width="220" height="72" rx="14" fill="#1e3a8a" stroke="#60a5fa"/>
    <text class="node-title" x="190" y="193" text-anchor="middle" fill="#eff6ff">User</text>
    <text class="node-copy" x="190" y="216" text-anchor="middle" fill="#dbeafe">Selects or drops a document</text>

    <rect x="65" y="285" width="250" height="92" rx="14" fill="#1e40af" stroke="#93c5fd"/>
    <text class="node-title" x="190" y="315" text-anchor="middle" fill="#eff6ff">React + TypeScript UI</text>
    <text class="node-copy" x="190" y="338" text-anchor="middle" fill="#dbeafe">UploadArea, Toast, loading state</text>
    <text class="node-copy" x="190" y="358" text-anchor="middle" fill="#dbeafe">Stores returned jobId</text>

    <rect x="80" y="430" width="220" height="72" rx="14" fill="#312e81" stroke="#a5b4fc"/>
    <text class="node-title" x="190" y="458" text-anchor="middle" fill="#eef2ff">Vite development proxy</text>
    <text class="node-copy" x="190" y="481" text-anchor="middle" fill="#e0e7ff">/api → localhost:8080</text>

    <rect x="80" y="620" width="220" height="78" rx="14" fill="#0f172a" stroke="#64748b" stroke-dasharray="7 6"/>
    <text class="node-title" x="190" y="650" text-anchor="middle" fill="#cbd5e1">Planned frontend work</text>
    <text class="node-copy" x="190" y="675" text-anchor="middle" fill="#94a3b8">Poll status and render deck</text>
  </g>

  <g>
    <rect x="425" y="160" width="225" height="112" rx="14" fill="#14532d" stroke="#4ade80"/>
    <text class="node-title" x="537" y="188" text-anchor="middle" fill="#f0fdf4">FlashcardController</text>
    <text class="node-copy" x="537" y="212" text-anchor="middle" fill="#dcfce7">POST /upload</text>
    <text class="node-copy" x="537" y="232" text-anchor="middle" fill="#dcfce7">GET /status/{jobId}</text>
    <text class="node-copy" x="537" y="252" text-anchor="middle" fill="#dcfce7">GET /result/{jobId}</text>

    <rect x="715" y="150" width="190" height="76" rx="14" fill="#166534" stroke="#86efac"/>
    <text class="node-title" x="810" y="178" text-anchor="middle" fill="#f0fdf4">JobService</text>
    <text class="node-copy" x="810" y="201" text-anchor="middle" fill="#dcfce7">Creates and updates jobs</text>

    <rect x="425" y="340" width="225" height="88" rx="14" fill="#166534" stroke="#86efac"/>
    <text class="node-title" x="537" y="370" text-anchor="middle" fill="#f0fdf4">FlashcardService @Async</text>
    <text class="node-copy" x="537" y="396" text-anchor="middle" fill="#dcfce7">Background pipeline orchestrator</text>

    <rect x="715" y="300" width="190" height="76" rx="14" fill="#15803d" stroke="#86efac"/>
    <text class="node-title" x="810" y="328" text-anchor="middle" fill="#f0fdf4">ParserService</text>
    <text class="node-copy" x="810" y="351" text-anchor="middle" fill="#dcfce7">Selects parser by extension</text>

    <rect x="950" y="285" width="165" height="105" rx="14" fill="#15803d" stroke="#86efac"/>
    <text class="node-title" x="1032" y="313" text-anchor="middle" fill="#f0fdf4">Document parsers</text>
    <text class="node-copy" x="1032" y="337" text-anchor="middle" fill="#dcfce7">PDFBox: PDF</text>
    <text class="node-copy" x="1032" y="357" text-anchor="middle" fill="#dcfce7">Apache POI:</text>
    <text class="node-copy" x="1032" y="376" text-anchor="middle" fill="#dcfce7">DOCX and PPTX</text>

    <rect x="715" y="470" width="190" height="96" rx="14" fill="#166534" stroke="#86efac"/>
    <text class="node-title" x="810" y="498" text-anchor="middle" fill="#f0fdf4">GeminiService</text>
    <text class="node-copy" x="810" y="521" text-anchor="middle" fill="#dcfce7">Build prompt and call API</text>
    <text class="node-copy" x="810" y="542" text-anchor="middle" fill="#dcfce7">Extract generated JSON</text>

    <rect x="950" y="480" width="165" height="76" rx="14" fill="#166534" stroke="#86efac"/>
    <text class="node-title" x="1032" y="508" text-anchor="middle" fill="#f0fdf4">FirebaseService</text>
    <text class="node-copy" x="1032" y="532" text-anchor="middle" fill="#dcfce7">Persist generated deck</text>

    <rect x="600" y="640" width="270" height="82" rx="14" fill="#064e3b" stroke="#34d399"/>
    <text class="node-title" x="735" y="669" text-anchor="middle" fill="#ecfdf5">Job lifecycle</text>
    <text class="node-copy" x="735" y="694" text-anchor="middle" fill="#d1fae5">PENDING → PROCESSING → COMPLETED / FAILED</text>
  </g>

  <g>
    <rect x="1240" y="160" width="265" height="105" rx="22" fill="#581c87" stroke="#c084fc"/>
    <text class="node-title" x="1372" y="191" text-anchor="middle" fill="#faf5ff">Redis</text>
    <text class="node-copy" x="1372" y="215" text-anchor="middle" fill="#f3e8ff">Job state, extracted text,</text>
    <text class="node-copy" x="1372" y="236" text-anchor="middle" fill="#f3e8ff">generated JSON and errors</text>

    <rect x="1240" y="350" width="265" height="85" rx="16" fill="#6b21a8" stroke="#d8b4fe"/>
    <text class="node-title" x="1372" y="382" text-anchor="middle" fill="#faf5ff">Google Gemini API</text>
    <text class="node-copy" x="1372" y="408" text-anchor="middle" fill="#f3e8ff">Generates flashcard JSON</text>

    <rect x="1240" y="510" width="265" height="100" rx="22" fill="#6b21a8" stroke="#d8b4fe"/>
    <text class="node-title" x="1372" y="544" text-anchor="middle" fill="#faf5ff">Firebase Firestore</text>
    <text class="node-copy" x="1372" y="570" text-anchor="middle" fill="#f3e8ff">Permanent deck storage</text>

    <rect x="1240" y="670" width="265" height="68" rx="14" fill="#581c87" stroke="#c084fc"/>
    <text class="node-title" x="1372" y="698" text-anchor="middle" fill="#faf5ff">Infisical</text>
    <text class="node-copy" x="1372" y="720" text-anchor="middle" fill="#f3e8ff">Gemini, Firebase and Redis secrets</text>
  </g>

  <g>
    <path class="edge" d="M190 237V285" stroke="#93c5fd" marker-end="url(#blueArrow)"/>
    <text class="edge-label" x="202" y="265">choose file</text>
    <path class="edge" d="M190 377V430" stroke="#93c5fd" marker-end="url(#blueArrow)"/>
    <text class="edge-label" x="202" y="409">multipart POST</text>
    <path class="edge" d="M300 466H365V216H425" stroke="#86efac" marker-end="url(#greenArrow)"/>
    <text class="edge-label" x="315" y="449">/api/flashcards/upload</text>
    <path class="edge" d="M650 190H715" stroke="#86efac" marker-end="url(#greenArrow)"/>
    <text class="edge-label" x="660" y="179">create job</text>
    <path class="edge" d="M905 188H1170V210H1240" stroke="#c084fc" marker-end="url(#purpleArrow)"/>
    <text class="edge-label" x="1015" y="177">PENDING / updates</text>
    <path class="edge" d="M425 236H350V330H315" stroke="#86efac" marker-end="url(#greenArrow)"/>
    <text class="edge-label" x="330" y="283">return jobId</text>
    <path class="edge" d="M537 272V340" stroke="#86efac" marker-end="url(#greenArrow)"/>
    <text class="edge-label" x="550" y="310">start async job</text>
    <path class="edge" d="M650 372H715" stroke="#86efac" marker-end="url(#greenArrow)"/>
    <text class="edge-label" x="660" y="361">extract text</text>
    <path class="edge" d="M905 338H950" stroke="#86efac" marker-end="url(#greenArrow)"/>
    <path class="edge" d="M650 400H680V518H715" stroke="#86efac" marker-end="url(#greenArrow)"/>
    <text class="edge-label" x="666" y="457">prompt + text</text>
    <path class="edge" d="M905 518H1175V392H1240" stroke="#c084fc" marker-end="url(#purpleArrow)"/>
    <text class="edge-label" x="1030" y="505">generateContent</text>
    <path class="edge" d="M650 410H920V518H950" stroke="#86efac" marker-end="url(#greenArrow)"/>
    <text class="edge-label" x="790" y="436">save deck</text>
    <path class="edge" d="M1115 518H1240" stroke="#c084fc" marker-end="url(#purpleArrow)"/>
    <text class="edge-label" x="1140" y="505">Firestore write</text>
    <path class="edge" d="M537 428V681H600" stroke="#34d399" marker-end="url(#greenArrow)"/>
    <text class="edge-label" x="548" y="574">status updates</text>
    <path class="edge" d="M870 681H1165V245H1240" stroke="#c084fc" marker-end="url(#purpleArrow)"/>
    <text class="edge-label" x="1025" y="669">persist lifecycle</text>
    <path class="edge" d="M300 660H370V255H425" stroke="#64748b" stroke-dasharray="7 6" marker-end="url(#greenArrow)"/>
    <text class="edge-label" x="310" y="645">future polling</text>
    <path class="edge" d="M1240 704H1150" stroke="#c084fc" stroke-dasharray="7 6" marker-end="url(#purpleArrow)"/>
    <text class="edge-label" x="1158" y="692">startup secrets</text>
  </g>

  <g transform="translate(40 820)">
    <rect width="1510" height="48" rx="12" fill="#0f172a" stroke="#334155"/>
    <circle cx="25" cy="24" r="6" fill="#93c5fd"/><text x="40" y="29" fill="#cbd5e1" font-size="12">Frontend request</text>
    <circle cx="190" cy="24" r="6" fill="#86efac"/><text x="205" y="29" fill="#cbd5e1" font-size="12">Backend processing</text>
    <circle cx="390" cy="24" r="6" fill="#c084fc"/><text x="405" y="29" fill="#cbd5e1" font-size="12">External storage/API</text>
    <text x="650" y="29" fill="#94a3b8" font-size="12">Dashed paths represent configuration or planned frontend behavior.</text>
  </g>
</svg>
