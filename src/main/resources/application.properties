# Application configuration
spring.application.name=flash-card-generator

# Server port (default is 8080)
server.port=8080

# File Upload Limits
# Spring Boot's default is 1MB, which is too small for most PDFs/PPTs.
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Redis: Infisical/deployment can provide REDIS_URL; local Docker Desktop falls back to localhost.
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Logging level for web requests
logging.level.org.springframework.web=DEBUG
logging.level.com.flashcard=INFO


